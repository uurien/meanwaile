name: Release — Prepare

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true
        type: string

jobs:
  prepare:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Validate version
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must look like 1.2.3 (got '${{ inputs.version }}')"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag and release branch don't already exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ inputs.version }}$"; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi
          if git ls-remote --heads origin "release/v${{ inputs.version }}" | grep -q .; then
            echo "::error::Branch release/v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Bump version
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Commit and push release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/v${{ inputs.version }}"
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ inputs.version }}"
          git push origin "release/v${{ inputs.version }}"

      - name: Open release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base "${{ github.ref_name }}" \
            --head "release/v${{ inputs.version }}" \
            --title "chore(release): v${{ inputs.version }}" \
            --body "Merging this PR builds, tags v${{ inputs.version }}, and publishes it as a GitHub Release (see \`release-publish.yml\`)."
