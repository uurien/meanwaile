name: Release — Prepare

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  prepare:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: bump
        run: |
          version="$(npm version "${{ inputs.bump }}" --no-git-tag-version | sed 's/^v//')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check tag and release branch don't already exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.bump.outputs.version }}$"; then
            echo "::error::Tag v${{ steps.bump.outputs.version }} already exists"
            exit 1
          fi
          if git ls-remote --heads origin "release/v${{ steps.bump.outputs.version }}" | grep -q .; then
            echo "::error::Branch release/v${{ steps.bump.outputs.version }} already exists"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Commit and push release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/v${{ steps.bump.outputs.version }}"
          git add package.json package-lock.json
          git commit -m "chore: v${{ steps.bump.outputs.version }}"
          git push origin "release/v${{ steps.bump.outputs.version }}"

      - name: Open release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base "${{ github.ref_name }}" \
            --head "release/v${{ steps.bump.outputs.version }}" \
            --title "chore: v${{ steps.bump.outputs.version }}" \
            --body "Merging this PR builds, tags v${{ steps.bump.outputs.version }}, and publishes it as a GitHub Release (see \`release-publish.yml\`)."
