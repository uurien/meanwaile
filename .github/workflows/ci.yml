name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --coverage

      - name: Coverage report
        # Only one OS posts the PR comment, otherwise it'd be duplicated per matrix leg.
        if: always() && matrix.os == 'macos-latest'
        uses: davelosert/vitest-coverage-report-action@v2

  package:
    if: github.event_name == 'pull_request'
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package app
        run: npm run forge:make

      - name: Upload macOS build artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: meanwaile-pr-${{ github.event.pull_request.number }}-macos
          path: |
            out/make/*.dmg
            out/make/zip/darwin/arm64/*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows build artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: meanwaile-pr-${{ github.event.pull_request.number }}-windows
          path: out/make/squirrel.windows/x64/*
          if-no-files-found: error
          retention-days: 14
