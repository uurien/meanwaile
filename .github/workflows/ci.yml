name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --coverage

      - name: Coverage report
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2

  package:
    if: github.event_name == 'pull_request'
    needs: build-and-test
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package app
        run: npm run forge:make

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meanwaile-pr-${{ github.event.pull_request.number }}
          path: |
            out/make/*.dmg
            out/make/zip/darwin/arm64/*.zip
          if-no-files-found: error
          retention-days: 14
