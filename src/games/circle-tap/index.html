<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="circle-tap.css" />
</head>
<body>
  <div id="hud">
    <h1 id="game-title">CircleTap</h1>
    <span id="score">Score: 0 [0]</span>
  </div>
  <div id="board"></div>
  <div id="game-over" class="overlay" hidden>
    <p>Score: <span id="final-score"></span></p>
    <p>Record: <span id="record-score"></span></p>
    <p class="hint">Tap to restart</p>
  </div>
  <script type="module" src="circle-tap.js"></script>
</body>
</html>
