<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1e1e1e;
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
    }
    #counter {
      font-size: 56px;
      font-weight: bold;
      letter-spacing: -2px;
    }
  </style>
</head>
<body>
  <span id="counter">0</span>
  <script>
    let count = 0;
    let interval = null;

    function resume() {
      if (interval) return;
      interval = setInterval(() => {
        count++;
        document.getElementById('counter').textContent = count;
      }, 100);
    }

    function pause() {
      clearInterval(interval);
      interval = null;
    }

    window.addEventListener('message', (e) => {
      if (e.data.type === 'game:resume') resume();
      if (e.data.type === 'game:pause') pause();
    });

    resume();
  </script>
</body>
</html>
