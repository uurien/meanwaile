<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <link rel="stylesheet" href="popover.css" />
  <title>Meanwaile</title>
</head>
<body>
  <div id="root">
    <div id="header">
      <div id="header-left">
        <button id="back-btn" title="Volver al inicio" hidden>‹</button>
        <span id="brand">meanwaile</span>
        <span id="game-name" hidden></span>
      </div>
      <button id="settings-btn" title="Settings">⚙</button>
    </div>

    <div id="hub-screen"></div>

    <div id="game-screen" hidden>
      <div id="game-area">
        <iframe id="game"></iframe>
        <div id="overlay">
          <p id="overlay-msg">Ready to play?</p>
          <button id="continue-btn">Start</button>
        </div>
      </div>
      <div id="placeholder" hidden>
        <div id="placeholder-icon"></div>
        <p id="placeholder-title">Próximamente</p>
        <p id="placeholder-text"></p>
      </div>
    </div>
  </div>
  <script type="module" src="popover.js"></script>
</body>
</html>
